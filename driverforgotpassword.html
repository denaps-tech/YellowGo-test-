<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forgot Password | YellowGo</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
            body {
                background: url("bg1.png");
                background-position: right bottom;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .container {
                background: none;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
                width: 90%;
                max-width: 400px;
            }
            h2.cl1 {
                color: white;
                margin-bottom: 12px;
                font-size: 1.4rem;
                text-align: center;
            }

            h2.cl1 hr {
                margin-top: 8px;
                border: none;
                height: 2px;
                background-color: #ff6600;
                border-radius: 3px;
            }
            .fill {
                position: relative;
                margin-bottom: 18px;
            }

            .fill input {
                font-weight: bolder;
                font-family: Georgia;
                width: 100%;
                padding: 10px 10px 10px 40px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 1rem;
            }

            /* 7️⃣ Input Icons */
            .fill svg {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                fill: #ff6600;
            }

            input:focus {
                border-color: #f1c40f;
            }
            button {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 8px;
                background: #ff6600;
                color: #fff;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.3s;
            }
            button:hover {
                background: #d4ac0d;
            }
            .message {
                text-align: center;
                margin-top: 15px;
                font-size: 14px;
            }
            .error {
                color: red;
            }
            .back-login {
                text-align: center;
                margin-top: 10px;
            }
            .back-login a {
                background: #eea719;
                border: 1px solid #eea719;
                font-family: Georgia;
                font-weight: bolder;
                text-decoration: underline;
                box-shadow:
                    0 0 15px #be9440,
                    0 2px #b7a787;
                padding: 8px;
                border-radius: 10px;
                color: #0D6EFD;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2 class="cl1">
                Forgot Password
                <hr />
            </h2>
            <form id="forgotForm">
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
                        />
                    </svg>
                    <input
                        type="text"
                        placeholder="Full Name"
                        minlength="8"
                        required
                    />
                </div>

                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M5 16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V7H5v9zm0-11h14v2H5V5z"
                        />
                    </svg>
                    <input
                        type="text"
                        placeholder="Driver code"
                        minlength="6"
                        maxlength="16"
                        required
                    />
                </div>

                <button type="submit">Verify</button>
            </form>
            <div class="message" id="message"></div>
            <div class="back-login"><a href="driver-login.html">Back to Login</a></div>
        </div>

        <script src="driverforgotpassword.js"></script>
    </body>
</html>
