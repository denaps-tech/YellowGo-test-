<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Login | YellowRide</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-image: url("bg2.png");
            background-position-y: 845px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: none;
            padding: 40px 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .links h3,
        .links a {
            flex: 0.4;
            text-align: center;
            padding: 12px 0;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .links h3#pop {
            background-color: #ff6600;
            color: white;
            border-radius: 50px;
            padding: 15px;
            height: 46px;
        }
        .links a#pas {
            border-radius: 50px;
            background-color: white;
            color: #ff6600;
            border: 1px solid #cc9020;
            box-shadow: 0 0 5px #63615e;
        }
        .links a#pas:hover {
            background-color: #ffe6cc;
        }

        h2.cl1 {
            color: white;
            margin-bottom: 12px;
            font-size: 1rem;
            text-align: center;
        }
        h2.cl1 hr {
            margin-top: 8px;
            border: none;
            height: 2px;
            background-color: #ff6600;
            border-radius: 2px;
        }

        .fill {
            position: relative;
            margin-bottom: 20px;
        }
        .fill input {
            font-weight: bolder;
            font-family: Georgia;
            width: 100%;
            padding: 10px 10px 10px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        .fill svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #ff6600;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #ff6600;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0948ff;
        }
        .was {
            font-size: 15px;
            margin: 11px;
            color: white;
        }
        .ff {
            display: flex;
            margin-bottom: 11px;
            justify-content: center;
            color: #0d6efd;
        }
        #pi {
            font-family: Georgia;
            font-weight: bolder;
            font-size: 16px;
            color: blue;
        }
        .toggle-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="driverLoginForm">
            <!-- Driver / Passenger Toggle -->
            <div class="links">
                <h3 id="pop">Driver</h3>
                <a href="passengerlogin.html" id="pas">Passenger</a>
            </div>

            <h2 class="cl1">Welcome Back!<hr /></h2>

            <!-- Full Name -->
            <div class="fill">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
                </svg>
                <input type="text" placeholder="Full Name" id="fullName" required />
            </div>

            <!-- Driver Code -->
            <div class="fill">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
                </svg>
                <input type="text" placeholder="Driver Code" id="driverCode" required />
            </div>

            <!-- Password -->
            <div class="fill">
                <svg viewBox="0 0 24 24">
                    <path d="M12 17c1.1 0 2-0.9 2-2v-3c0-1.1-0.9-2-2-2s-2 0.9-2 2v3c0 1.1 0.9 2 2 2zm6-7h-1V7c0-2.8-2.2-5-5-5S7 4.2 7 7v3H6c-1.1 0-2 0.9-2 2v9c0 1.1 0.9 2 2 2h12c1.1 0 2-0.9 2-2v-9c0-1.1-0.9-2-2-2zm-6-5c1.7 0 3 1.3 3 3v3h-6V8c0-1.7 1.3-3 3-3z" />
                </svg>
                <input type="password" id="password" placeholder="Password" minlength="8" required />
                <img id="togglePasswordIcon" class="toggle-icon" src="eye.png" alt="toggle password" />
            </div>

            <a href="#" class="ff">Forgot Password</a>
            <button type="submit">Login</button>
        </form>

        <p class="was">Don't have an account?
            <span class="spell"><a id="pi" href="driversignup.html">Sign up</a></span>
        </p>
    </div>

    <script type="module" src="driver-login.js"></script>
</body>
</html>
