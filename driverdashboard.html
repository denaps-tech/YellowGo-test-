<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Driver Dashboard | YellowGo</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
            body {
                background: url("bg2.png");
                background-position: left bottom;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 15px;
            }
            .container {
                background: none;
                border-radius: 15px;
                width: 100%;
                max-width: 450px;
                padding: 25px 20px;
                color: white;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                text-align: center;
            }
            h2 {
                font-family: Georgia;
                margin-bottom: 15px;
                color: #ff6600;
            }
            p {
                font-family: Georgia;
                margin-bottom: 12px;
            }
            strong{
              font-family: Georgia;
              font-weight: bolder;
            }
            button {
                padding: 12px 20px;
                margin: 10px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                font-weight: bold;
            }
            #logoutBtn {
                background: #ff6600;
                color: white;
            }
            #toggleOnlineBtn {
                background: blue;
                color: white;
            }
            #toggleOnlineBtn.online {
                background: green;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>Welcome, <span id="driverName">Driver</span>!</h2>
            <p><strong>Driver Code:</strong> <span id="driverCode"></span></p>
            <p><strong>Email:</strong> <span id="driverEmail"></span></p>
            <p><strong>Phone:</strong> <span id="driverPhone"></span></p>

            <button id="toggleOnlineBtn">Go Online</button>
            <button id="logoutBtn">Logout</button>
        </div>
        <script src="driverdashboard.js"></script>
    </body>
</html>
