<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Driver Sign Up | YellowGo</title>

        <!-- Supabase JS -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.33.1/dist/supabase.min.js"></script>

        <style>
            /* Global Reset */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
            body {
                background-image: url("bg2.png");
                background-size: cover;
                background-position: left bottom;
                background-repeat: no-repeat;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
            }
            .container {
                background: none;
                padding: 30px 20px;
                border-radius: 15px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }
            .links {
                display: flex;
                justify-content: space-between;
                margin-bottom: 20px;
            }
            .links h3,
            .links a {
                flex: 0.45;
                text-align: center;
                padding: 12px 0;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
                text-decoration: none;
                border-radius: 50px;
            }
            .links h3#pop {
                background-color: #ff6600;
                color: white;
            }
            .links a#pas {
                background-color: white;
                color: #ff6600;
                border: 1px solid #cc9020;
                box-shadow: 0 0 5px #63615e;
            }
            .links a#pas:hover {
                background-color: #0489e4;
            }
            h2.cl1 {
                color: white;
                margin-bottom: 12px;
                font-size: 1rem;
                text-align: center;
            }
            h2.cl1 hr {
                margin-top: 8px;
                border: none;
                height: 2px;
                background-color: #ff6600;
                border-radius: 3px;
            }
            .fill {
                position: relative;
                margin-bottom: 18px;
            }
            .fill input {
                font-weight: bolder;
                font-family: Georgia, serif;
                width: 100%;
                padding: 10px 10px 10px 40px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 1rem;
            }
            .fill svg {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                fill: #ff6600;
            }
            label {
                font-weight: bold;
                display: flex;
                justify-content: center;
                gap: 5px;
                margin-bottom: 12px;
                color: white;
                font-size: 0.95rem;
                flex-wrap: wrap;
            }
            label input {
                width: 20px;
                height: 20px;
            }
            label a {
                font-weight: bolder;
                color: blue;
                font-family: Georgia, serif;
            }
            label a:hover {
                text-decoration: underline;
            }
            button {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 8px;
                background-color: #ff6600;
                color: white;
                font-size: 1rem;
                cursor: pointer;
                font-weight: bold;
                transition: background 0.3s;
            }
            button:hover {
                background-color: #e65c00;
            }
            .was {
                font-size: 0.9rem;
                margin: 12px 0 0 0;
                text-align: center;
                color: white;
            }
            #pi {
                font-family: Georgia, serif;
                font-weight: bolder;
                color: blue;
                text-decoration: underline;
            }
            #pi:hover {
                text-decoration: underline;
            }
            @media (max-width: 480px) {
                .container {
                    padding: 20px 15px;
                }
                .links h3,
                .links a {
                    font-size: 0.9rem;
                    padding: 10px 0;
                }
                h2.cl1 {
                    font-size: 1.1rem;
                }
                .fill input {
                    font-size: 0.95rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <form id="driverSignUpForm">
                <div class="links">
                    <h3 id="pop">Driver</h3>
                    <a href="passengersignup.html" id="pas">Passenger</a>
                </div>

                <h2 class="cl1">
                    Create Your Account
                    <hr />
                </h2>

                <!-- Full Name -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
                        />
                    </svg>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="Full Name"
                        minlength="8"
                        required
                    />
                </div>

                <!-- Phone -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M6.6 10.8c1.2 2.4 2.8 4 5.2 5.2l1.2-1.2c0.2-0.2 0.4-0.3 0.7-0.2 0.8 0.2 1.6 0.3 2.4 0.3 0.4 0 0.7 0.3 0.7 0.7v2.8c0 0.4-0.3 0.7-0.7 0.7C10.5 19.6 4.4 13.5 4.4 6.7 4.4 6.3 4.7 6 5.1 6h2.8c0.4 0 0.7 0.3 0.7 0.7 0 0.8 0.1 1.6 0.3 2.4 0.1 0.3 0 0.5-0.2 0.7l-1.2 1.2z"
                        />
                    </svg>
                    <input
                        type="tel"
                        id="phoneNumber"
                        placeholder="Phone Number"
                        minlength="10"
                        maxlength="10"
                        required
                    />
                </div>

                <!-- Momo Number -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M6.6 10.8c1.2 2.4 2.8 4 5.2 5.2l1.2-1.2c0.2-0.2 0.4-0.3 0.7-0.2 0.8 0.2 1.6 0.3 2.4 0.3 0.4 0 0.7 0.3 0.7 0.7v2.8c0 0.4-0.3 0.7-0.7 0.7C10.5 19.6 4.4 13.5 4.4 6.7 4.4 6.3 4.7 6 5.1 6h2.8c0.4 0 0.7 0.3 0.7 0.7 0 0.8 0.1 1.6 0.3 2.4 0.1 0.3 0 0.5-0.2 0.7l-1.2 1.2z"
                        />
                    </svg>
                    <input
                        type="tel"
                        id="momoNumber"
                        placeholder="Momo Number"
                        minlength="10"
                        maxlength="10"
                        required
                    />
                </div>

                <!-- Email -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 13.2L2.4 6h19.2L12 13.2zM2.4 8.4v9.6h19.2v-9.6l-9.6 6-9.6-6z"
                        />
                    </svg>
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                    />
                </div>

                <!-- Password -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 17c1.1 0 2-0.9 2-2v-3c0-1.1-0.9-2-2-2s-2 0.9-2 2v3c0 1.1 0.9 2 2 2zm6-7h-1V7c0-2.8-2.2-5-5-5S7 4.2 7 7v3H6c-1.1 0-2 0.9-2 2v9c0 1.1 0.9 2 2 2h12c1.1 0 2-0.9 2-2v-9c0-1.1-0.9-2-2-2zm-6-5c1.7 0 3 1.3 3 3v3h-6V8c0-1.7 1.3-3 3-3z"
                        />
                    </svg>
                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        minlength="8"
                        required
                    />
                    <img
                        id="togglePasswordIcon"
                        src="eye.png"
                        onclick="
                            togglePassword('password', 'togglePasswordIcon')
                        "
                        style="
                            position: absolute;
                            right: 12px;
                            top: 50%;
                            transform: translateY(-50%);
                            cursor: pointer;
                            width: 20px;
                        "
                        alt="toggle password"
                    />
                </div>

                <!-- Vehicle Number -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M5 16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V7H5v9zm0-11h14v2H5V5z"
                        />
                    </svg>
                    <input
                        type="text"
                        id="vehicleNumber"
                        placeholder="Vehicle Number"
                        minlength="6"
                        maxlength="16"
                        required
                    />
                </div>

                <!-- Ghana Card -->
                <div class="fill">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z"
                        />
                    </svg>
                    <input
                        type="text"
                        id="ghanaCard"
                        placeholder="Ghana Card Number"
                        minlength="20"
                        maxlength="25"
                        required
                    />
                </div>

                <!-- Terms -->
                <label
                    ><input type="checkbox" id="terms" required /> I agree to
                    <a href="terms.html">Terms & Conditions</a></label
                >

                <button type="submit">Sign Up</button>
            </form>

            <p class="was">
                Already have an account?
                <a id="pi" href="driver-login.html">Login</a>
            </p>
        </div>

        <!-- Link backend JS -->
        <script src="driver-signup.js"></script>
    </body>
</html>
