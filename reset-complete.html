<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset Password | YellowGo</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background-image: url("bg1.png");
                background-position: right bottom;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .container {
                background: none;
                padding: 25px;
                border-radius: 10px;
                width: 100%;
                max-width: 350px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            h2 {
                text-align: center;
                margin-bottom: 20px;
            }
            .fill {
                position: relative;
                margin-bottom: 20px;
            }
            .fill input {
                font-weight: bolder;
                font-family: Georgia;
                width: 87%;
                padding: 10px 10px 10px 40px;
                border: none;
                border-radius: 8px;
                font-size: 16px;
            }
            .fill svg {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                fill: #ff6600;
            }
            button {
              font-family: Georgia;
                color: white;
                width: 100%;
                padding: 12px;
                background: #ff6600;
                border: none;
                border-radius: 6px;
                font-weight: bolder;
                cursor: pointer;
            }
            button:hover {
                background: blue;
            }
            .error {
                color: red;
                font-size: 18px;
                text-align: center;
            }
            .success {
                color: green;
                font-size: 14px;
                text-align: center;
            }
            .toggle-pass {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                width: 20px;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>Reset Password</h2>

            <!-- Password -->
            <div class="fill">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 17c1.1 0 2-0.9 2-2v-3c0-1.1-0.9-2-2-2s-2 0.9-2 2v3c0 1.1 0.9 2 2 2zm6-7h-1V7c0-2.8-2.2-5-5-5S7 4.2 7 7v3H6c-1.1 0-2 0.9-2 2v9c0 1.1 0.9 2 2 2h12c1.1 0 2-0.9 2-2v-9c0-1.1-0.9-2-2-2zm-6-5c1.7 0 3 1.3 3 3v3h-6V8c0-1.7 1.3-3 3-3z"
                    />
                </svg>
                <input
                    type="password"
                    placeholder="Password"
                    minlength="8"
                    required
                    id="password"
                />
                <img
                    id="togglePasswordIcon"
                    src="eye.png"
                    class="toggle-pass"
                    onclick="togglePassword('password', 'togglePasswordIcon')"
                    alt="toggle password visibility"
                />
            </div>

            <!-- Confirm Password -->
            <div class="fill">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 17c1.1 0 2-0.9 2-2v-3c0-1.1-0.9-2-2-2s-2 0.9-2 2v3c0 1.1 0.9 2 2 2zm6-7h-1V7c0-2.8-2.2-5-5-5S7 4.2 7 7v3H6c-1.1 0-2 0.9-2 2v9c0 1.1 0.9 2 2 2h12c1.1 0 2-0.9 2-2v-9c0-1.1-0.9-2-2-2zm-6-5c1.7 0 3 1.3 3 3v3h-6V8c0-1.7 1.3-3 3-3z"
                    />
                </svg>
                <input
                    type="password"
                    placeholder="Confirm Password"
                    minlength="8"
                    required
                    id="confirmPassword"
                />
                <img
                    id="toggleConfirmIcon"
                    src="eye.png"
                    class="toggle-pass"
                    onclick="
                        togglePassword('confirmPassword', 'toggleConfirmIcon')
                    "
                    alt="toggle password visibility"
                />
            </div>

            <button onclick="resetPassword()">Reset Password</button>

            <p id="message"></p>
        </div>

<script src="reset-complete.js"></script>
    </body>
</html>
